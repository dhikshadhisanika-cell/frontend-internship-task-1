<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Internship Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h2>My Website</h2>
        <nav>
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to My Landing Page</h1>
        <p>Frontend Internship Task using HTML and CSS</p>
        <button>Get Started</button>
    </section>

    <!-- Features Section -->
    <section class="features">
        <div class="feature-box">
            <h3>Fast</h3>
            <p>Quick and responsive design.</p>
        </div>

        <div class="feature-box">
            <h3>Simple</h3>
            <p>Easy to understand layout.</p>
        </div>

        <div class="feature-box">
            <h3>Modern</h3>
            <p>Clean and attractive UI.</p>
        </div>
    </section>
<!-- Contact Form -->
<section class="contact">
    <h2>Contact Us</h2>

    <form id="contactForm">

        <input
            type="text"
            id="name"
            placeholder="Enter your name"
        >

        <input
            type="email"
            id="email"
            placeholder="Enter your email"
        >

        <textarea
            id="message"
            placeholder="Enter your message"
        ></textarea>

        <button type="submit">Send Message</button>

    </form>

    <p id="error"></p>
    <p id="success"></p>

</section>
    <!-- Footer -->
    <footer>
        <p>© 2026 Frontend Internship Task</p>
    </footer>
<script src="script.js"></script>
</body>
</html>
